name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts (test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Runs both contracts' unit/integration test suites (wired into each
      # lib crate via inline `mod tests { ... include!(...) }` blocks).
      - name: Run contract tests
        run: cargo test --workspace

      # Compiles both contracts to release wasm the same way a real deploy
      # would, so a build-breaking change fails CI before it reaches testnet.
      # (Using `cargo build` directly rather than `stellar contract build` --
      # the stellar-cli install pulls in ethnum 1.5.2, which fails to
      # compile on current stable rustc due to an unrelated upstream
      # transmute-size bug. cargo build produces the identical wasm output
      # without needing the CLI tool.)
      - name: Build contract wasm
        run: cargo build --release --target wasm32v1-none --workspace

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32v1-none/release/*.wasm

  frontend:
    name: Frontend (lint + test + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
